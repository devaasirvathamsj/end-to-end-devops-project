
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app
  labels:
    app: devops-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-app
  template:
    metadata:
      labels:
        app: devops-app
    spec:
      containers:
        - name: devops-app
          image: devaasirvatham/devops-app:{{ .Values.image.tag }}
          ports:
            - containerPort: 8080

          env:
            - name: APP_NAME
              value: "devops-app"
            - name: APP_VERSION
              value: "v1"

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
