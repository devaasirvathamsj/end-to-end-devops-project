name: CI/CD

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.22

      - name: Build Application
        run: |
          cd app
          go build -o devops-app

      - name: Run Tests
        run: |
          cd app
          go test ./...

  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.22

      - name: Run GolangCI-Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.56.2
          working-directory: app

  docker:
    runs-on: ubuntu-latest

    needs:
      - build
      - code-quality

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: devaasirvathamsj/devops-app:${{ github.run_id }}

  update-k8s-manifest:
    runs-on: ubuntu-latest

    needs: docker

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}

      - name: Update Image Tag in Helm Chart
        run: |
          sed -i 's/tag: .*/tag: "${{ github.run_id }}"/' helm/devops-app-chart/values.yaml

      - name: Commit and Push Changes
        run: |
          git config --global user.email "devaasirvathamsj@gmail.com"
          git config --global user.name "Deva Asirvatham"

          git add helm/devops-app-chart/values.yaml
          git commit -m "Update image tag to ${{ github.run_id }}" || echo "No changes to commit"
          git push
